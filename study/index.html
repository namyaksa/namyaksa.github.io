<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>파란약국 공부방</title>

<link rel="stylesheet" href="../style.css">

<style>

.study-header{
    background:linear-gradient(135deg,#d8f5f2,#ffffff);
    padding:50px 20px;
    text-align:center;
}

.study-header h1{
    color:#0d9488;
    font-size:42px;
    margin-bottom:10px;
}

.study-header p{
    color:#666;
}

.search-box{
    max-width:700px;
    margin:40px auto;
}

.search-box input{

    width:100%;

    padding:15px;

    font-size:18px;

    border-radius:12px;

    border:1px solid #ccc;

}

.toolbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin:30px auto;

    max-width:1000px;

}

.write-btn{

    background:#0d9488;

    color:white;

    padding:12px 20px;

    text-decoration:none;

    border-radius:10px;

}

.post-list{

    max-width:1000px;

    margin:auto;

    display:grid;

    gap:25px;

}

.post{

    background:white;

    border-radius:15px;

    padding:25px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.post h2{

    color:#0d9488;

    margin-bottom:10px;

}

.date{

    color:#888;

    font-size:14px;

}

.tags{

    margin:15px 0;

}

.tag{

    display:inline-block;

    background:#e8f8f6;

    color:#0d9488;

    padding:5px 10px;

    border-radius:20px;

    margin-right:8px;

    font-size:14px;

}

.read{

    display:inline-block;

    margin-top:15px;

    text-decoration:none;

    color:#0d9488;

    font-weight:bold;

}

</style>

</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">💙 파란약국</div>

<div class="menu">

<a href="../index.html">홈</a>

<a href="#">공부방</a>

<a href="../heartworm.html">상담가이드</a>

</div>

</nav>

</div>

</header>

<section class="study-header">

<h1>📚 공부방</h1>

<p>약학 · AI · 영어 · 프로그램 공부를 기록하는 공간</p>

</section>

<div class="search-box">

<input
type="text"
id="search"
placeholder="제목, 내용, 태그 검색...">

</div>

<div class="toolbar">

<h2>최근 공부한 글</h2>

<a class="write-btn" href="write.html">

✍ 새 글 작성

</a>

</div>

<div class="post-list" id="posts">

<div class="post">

<h2>Gemini Prompt Engineering</h2>

<div class="date">

2026-07-21

</div>

<div class="tags">

<span class="tag">AI</span>

<span class="tag">Gemini</span>

</div>

<p>

프롬프트 작성법과 예제를 정리한 공부 노트.

</p>

<a class="read" href="#">

읽기 →

</a>

</div>

<div class="post">

<h2>약국 영어 표현</h2>

<div class="date">

2026-07-20

</div>

<div class="tags">

<span class="tag">영어</span>

<span class="tag">약국</span>

</div>

<p>

외국인 손님 응대 표현을 정리.

</p>

<a class="read" href="#">

읽기 →

</a>

</div>

</div>

<script>

const search=document.getElementById("search");

search.addEventListener("keyup",function(){

const keyword=this.value.toLowerCase();

document.querySelectorAll(".post").forEach(post=>{

const text=post.innerText.toLowerCase();

post.style.display=text.includes(keyword)?"block":"none";

});

});

</script>

<script src="../app.js"></script>

</body>

</html>
